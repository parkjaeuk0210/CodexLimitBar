<svg width="1100" height="560" viewBox="0 0 1100 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CodexLimitBar menu bar preview</title>
  <desc id="desc">A macOS style menu bar showing a compact CodexLimitBar usage percentage and menu.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1100" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F6F7F8"/>
      <stop offset="1" stop-color="#E8EBEF"/>
    </linearGradient>
    <filter id="shadow" x="-40" y="-40" width="1180" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#1F2937" flood-opacity="0.18"/>
    </filter>
    <filter id="softShadow" x="-20" y="-20" width="540" height="420" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#111827" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1100" height="560" rx="34" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="90" y="86" width="920" height="388" rx="26" fill="#FCFCFD"/>
    <rect x="90.5" y="86.5" width="919" height="387" rx="25.5" stroke="#DADDE3"/>
  </g>

  <rect x="90" y="86" width="920" height="50" rx="26" fill="#F7F7F8"/>
  <path d="M90 112C90 97.6406 101.641 86 116 86H984C998.359 86 1010 97.6406 1010 112V136H90V112Z" fill="#F7F7F8"/>
  <rect x="90.5" y="135.5" width="919" height="1" fill="#E4E6EA"/>

  <circle cx="122" cy="111" r="7" fill="#FF5F57"/>
  <circle cx="146" cy="111" r="7" fill="#FFBD2E"/>
  <circle cx="170" cy="111" r="7" fill="#28C840"/>

  <text x="212" y="118" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', Arial, sans-serif" font-size="17" font-weight="600" fill="#202124">CodexLimitBar</text>
  <text x="735" y="118" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', Arial, sans-serif" font-size="14" fill="#5F6368">Wed 9:41</text>

  <g transform="translate(815 96)">
    <rect x="0" y="0" width="88" height="30" rx="15" fill="#111827"/>
    <circle cx="22" cy="15" r="9" fill="#F9FAFB"/>
    <path d="M22 8.5C25.5899 8.5 28.5 11.4101 28.5 15C28.5 18.5899 25.5899 21.5 22 21.5C18.4101 21.5 15.5 18.5899 15.5 15C15.5 11.4101 18.4101 8.5 22 8.5Z" stroke="#111827" stroke-width="1.4"/>
    <path d="M18.7 15.2C20.5 12.2 23.5 12.2 25.3 15.2C23.5 18.2 20.5 18.2 18.7 15.2Z" stroke="#111827" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="41" y="20" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', Arial, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">92%</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="640" y="148" width="300" height="274" rx="14" fill="#FFFFFF"/>
    <rect x="640.5" y="148.5" width="299" height="273" rx="13.5" stroke="#E3E5E8"/>
    <text x="666" y="184" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">CodexLimitBar</text>
    <text x="666" y="212" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', Arial, sans-serif" font-size="13" fill="#6B7280">Last refreshed 1 min ago</text>
    <rect x="666" y="234" width="248" height="1" fill="#ECEEF1"/>
    <text x="690" y="268" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', Arial, sans-serif" font-size="15" fill="#111827">5-hour limit</text>
    <path d="M671 261.5L678 268.5L688 256.5" stroke="#111827" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="690" y="306" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', Arial, sans-serif" font-size="15" fill="#111827">Weekly limit</text>
    <rect x="666" y="326" width="248" height="1" fill="#ECEEF1"/>
    <text x="666" y="360" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', Arial, sans-serif" font-size="15" fill="#111827">Refresh Now</text>
    <text x="666" y="394" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', Arial, sans-serif" font-size="15" fill="#111827">Quit</text>
  </g>

  <text x="160" y="235" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', Arial, sans-serif" font-size="46" font-weight="760" fill="#111827">Your Codex limit,</text>
  <text x="160" y="291" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', Arial, sans-serif" font-size="46" font-weight="760" fill="#111827">always one glance away.</text>
  <text x="160" y="340" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', Arial, sans-serif" font-size="18" fill="#4B5563">A small macOS menu bar meter for 5-hour and weekly usage windows.</text>
  <text x="160" y="371" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', Arial, sans-serif" font-size="18" fill="#4B5563">Built for people who use Codex all day.</text>
</svg>
