name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  notarized-release:
    name: Notarized macOS release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release version
        run: |
          set -euo pipefail
          version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Resources/Info.plist)"
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" != "v$version" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match app version $version" >&2
            exit 2
          fi

      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
          DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: ./scripts/ci-import-codesign-cert.sh

      - name: Store notary credentials
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -euo pipefail
          ASC_KEY_PATH="$RUNNER_TEMP/AuthKey_$ASC_KEY_ID.p8"
          printf '%s' "$ASC_API_KEY_BASE64" | base64 --decode > "$ASC_KEY_PATH"
          ASC_KEY_PATH="$ASC_KEY_PATH" \
            ASC_KEY_ID="$ASC_KEY_ID" \
            ASC_ISSUER_ID="$ASC_ISSUER_ID" \
            ./scripts/configure-notary.sh

      - name: Build notarized package
        run: ./scripts/package-notarized.sh

      - name: Resolve release tag
        id: release
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Resources/Info.plist)"
            tag="v$version"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create release if needed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" \
              --title "CodexLimitBar $tag" \
              --notes "Notarized CodexLimitBar release."
          fi

      - name: Upload notarized assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          version="${tag#v}"
          gh release upload "$tag" \
            "dist/CodexLimitBar-$version-notarized.zip" \
            "dist/CodexLimitBar-$version-notarized.zip.sha256" \
            --clobber
